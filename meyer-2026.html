<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meyer Eventos · Lotação 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ───────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0f1419;
    --surface2:  #161d26;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);
    --text:      #e8edf2;
    --muted:     #5a6a7a;
    --muted2:    #8a9bab;
    --green:     #16a34a;
    --green-bg:  rgba(22,163,74,0.12);
    --amber:     #b45309;
    --amber-bg:  rgba(180,83,9,0.12);
    --red:       #b91c1c;
    --red-bg:    rgba(185,28,28,0.12);
    --accent:    #3b82f6;
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }
  body { min-height: 100vh; padding: 24px 20px 40px; max-width: 1200px; margin: 0 auto; }

  /* ── Header ─────────────────────────────────────── */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
    margin-bottom: 20px; flex-wrap: wrap; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--surface2) 0%, rgba(59,130,246,0.15) 100%);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--accent);
  }
  .logo-text h1 { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .logo-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .stats { display: flex; gap: 24px; align-items: center; }
  .stat { text-align: right; }
  .stat-num { font-size: 22px; font-weight: 600; line-height: 1; font-family: 'DM Mono', monospace; }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Status bar ──────────────────────────────────── */
  .status-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 18px; flex-wrap: wrap; gap: 8px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .status-dot.loading { background: var(--amber); animation: blink .8s infinite; }
  .status-dot.error { background: var(--red); }
  .status-text { font-size: 12px; color: var(--muted2); flex: 1; }
  .countdown-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .countdown-track { width: 80px; height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; }
  .countdown-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 1s linear; }
  .countdown-lbl { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; min-width: 48px; }
  .btn-refresh {
    padding: 4px 12px; font-size: 11px; font-family: 'DM Sans', sans-serif;
    background: var(--surface2); color: var(--muted2); border: 1px solid var(--border2);
    border-radius: 6px; cursor: pointer; transition: all .15s;
  }
  .btn-refresh:hover { background: var(--border2); color: var(--text); }

  /* ── Progress bar ────────────────────────────────── */
  .prog-wrap { margin-bottom: 20px; }
  .prog-track { height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .prog-fill { height: 100%; border-radius: 99px; transition: width .8s ease; }
  .prog-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── Month grid ──────────────────────────────────── */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .month-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 14px 12px;
    transition: border-color .2s;
  }
  .month-card:hover { border-color: var(--border2); }
  .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .month-name { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.2px; }
  .month-badge {
    font-size: 10px; font-weight: 500; padding: 2px 9px; border-radius: 99px;
    font-family: 'DM Mono', monospace;
  }
  .badge-green  { background: var(--green-bg); color: #4ade80; }
  .badge-amber  { background: var(--amber-bg); color: #fb923c; }
  .badge-red    { background: var(--red-bg);   color: #f87171; }
  .badge-full   { background: rgba(255,255,255,0.05); color: var(--muted); }

  /* ── Day columns ─────────────────────────────────── */
  .day-cols { display: flex; gap: 3px; }
  .day-col  { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .col-header {
    font-size: 9px; font-weight: 500; color: var(--muted); text-align: center;
    padding: 3px 0 5px; border-bottom: 1px solid var(--border); margin-bottom: 1px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }

  /* ── Date chips ──────────────────────────────────── */
  .chip {
    width: 100%; height: 33px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace;
    cursor: default; position: relative; transition: transform .1s;
  }
  .chip:hover { transform: scale(1.08); z-index: 5; }
  .chip-avail-3plus { background: #14532d; color: #4ade80; }
  .chip-avail-2     { background: #431407; color: #fb923c; }
  .chip-avail-1     { background: #450a0a; color: #f87171; }
  .chip-booked {
    background: var(--surface2); color: var(--muted);
    border: 1px dashed rgba(255,255,255,0.08);
  }

  /* Tooltip */
  .chip[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 5px); left: 50%;
    transform: translateX(-50%);
    background: #1e2d3d; color: var(--text); font-size: 10px;
    padding: 4px 8px; border-radius: 5px; white-space: nowrap;
    border: 1px solid var(--border2); z-index: 20;
    font-family: 'DM Sans', sans-serif; font-weight: 400;
    pointer-events: none;
  }

  /* ── Mini bar ────────────────────────────────────── */
  .mini-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 10px; }
  .mini-fill { height: 100%; border-radius: 99px; }

  /* ── Legend ──────────────────────────────────────── */
  .legend {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .legend-items { display: flex; gap: 18px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted2); }
  .leg-dot { width: 11px; height: 11px; border-radius: 3px; }

  /* ── Error / loading screen ──────────────────────── */
  .overlay {
    display: none; position: fixed; inset: 0; background: var(--bg);
    align-items: center; justify-content: center; flex-direction: column;
    gap: 12px; text-align: center; padding: 20px; z-index: 100;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 18px; font-weight: 500; }
  .overlay p { font-size: 13px; color: var(--muted2); max-width: 440px; line-height: 1.7; }
  .overlay code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ── TV mode ─────────────────────────────────────── */
  .tv-only { display: none; }
  body.tv .tv-hide { display: none !important; }
  body.tv .tv-only { display: flex; }
  body.tv .header { padding-bottom: 12px; margin-bottom: 12px; }
  body.tv .month-card { padding: 10px 12px 8px; }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  @keyframes spin   { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Config: preencha antes de subir ───────────────────────── -->
<script>
  const CONFIG = {
    API_KEY:  'AIzaSyBHu5yPq9Ha6EBo5SQsWDS4OuVPrH7IEFk',          // ← substitua aqui
    CAL_ID:   'c_8cc9ttvqasdrob2q56gg7uefjs@group.calendar.google.com',
    YEAR:     2026,
    INTERVAL: 10,   // minutos entre cada atualização automática
  };
</script>
<!-- ──────────────────────────────────────────────────────────── -->

<!-- Error overlay -->
<div class="overlay" id="overlay">
  <div style="font-size:32px">⚠️</div>
  <h2 id="ov-title">Erro de configuração</h2>
  <p id="ov-msg"></p>
</div>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-mark">M</div>
    <div class="logo-text">
      <h1>Meyer Eventos · <span id="year-label">2026</span></h1>
      <p>Dashboard de lotação · Todos os dias da semana</p>
    </div>
  </div>
  <div class="stats tv-hide">
    <div class="stat"><div class="stat-num" id="st-total" style="color:var(--muted)">—</div><div class="stat-lbl">total</div></div>
    <div class="stat"><div class="stat-num" id="st-sold"  style="color:#f87171">—</div><div class="stat-lbl">vendidas</div></div>
    <div class="stat"><div class="stat-num" id="st-avail" style="color:#4ade80">—</div><div class="stat-lbl">disponíveis</div></div>
    <div class="stat"><div class="stat-num" id="st-pct"   style="color:#60a5fa">—</div><div class="stat-lbl">ocupação</div></div>
  </div>
</header>

<!-- Status bar -->
<div class="status-bar tv-hide">
  <div class="status-dot" id="sdot"></div>
  <span class="status-text" id="stext">Carregando…</span>
  <div class="countdown-wrap">
    <div class="countdown-track"><div class="countdown-fill" id="cfill" style="width:100%"></div></div>
    <span class="countdown-lbl" id="clbl">—</span>
    <button class="btn-refresh" onclick="load()">↺ Agora</button>
    <button class="btn-refresh tv-hide" onclick="toggleTV()" id="tv-btn">⬜ TV</button>
  </div>
</div>
<div class="tv-only" style="font-size:11px;color:var(--muted);margin-bottom:12px;justify-content:flex-end">
  <span id="tv-updated">—</span>
  &nbsp;·&nbsp;
  <button class="btn-refresh" onclick="toggleTV()">← Sair do modo TV</button>
</div>

<!-- Progress -->
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  <div class="prog-labels"><span>0%</span><span id="plbl">carregando…</span><span>100%</span></div>
</div>

<!-- Month grid -->
<div class="month-grid" id="month-grid"></div>

<!-- Legend -->
<footer class="legend tv-hide">
  <div class="legend-items">
    <div class="leg"><div class="leg-dot" style="background:#14532d;border:1px solid #166534"></div> 3–4 disponíveis nesse dia</div>
    <div class="leg"><div class="leg-dot" style="background:#431407;border:1px solid #7c2d12"></div> 2 disponíveis</div>
    <div class="leg"><div class="leg-dot" style="background:#450a0a;border:1px solid #7f1d1d"></div> 1 disponível</div>
    <div class="leg"><div class="leg-dot" style="background:var(--surface2);border:1px dashed rgba(255,255,255,0.1)"></div> Vendida</div>
  </div>
  <div style="font-size:11px;color:var(--muted)">Primore Eventos · Meyer</div>
</footer>

<script>
/* ── Constants ──────────────────────────────────────────── */
const MONTHS  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                 "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DOW_PT  = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

/* ── State ──────────────────────────────────────────────── */
let cdTimer = null, cdSec = 0, isTV = false;

/* ── Calendar helpers ───────────────────────────────────── */
function getColsByDow(year, month) {
  const cols = Array.from({length: 7}, () => []);
  const d = new Date(year, month, 1);
  while (d.getMonth() === month) {
    cols[d.getDay()].push(d.getDate());
    d.setDate(d.getDate() + 1);
  }
  return cols;
}

function buildBookedMap(items) {
  // Returns: month (0-11) → Map<day, title>
  const bym = Array.from({length: 12}, () => new Map());
  (items || []).forEach(ev => {
    const ds = (ev.start?.date || ev.start?.dateTime || '').slice(0, 10);
    if (!ds) return;
    const d = new Date(ds + 'T12:00:00');
    if (d.getFullYear() === CONFIG.YEAR)
      bym[d.getMonth()].set(d.getDate(), ev.summary || '');
  });
  return bym;
}

/* ── Chip color ─────────────────────────────────────────── */
function chipClass(availInCol, booked) {
  if (booked)       return 'chip chip-booked';
  if (availInCol >= 3) return 'chip chip-avail-3plus';
  if (availInCol === 2) return 'chip chip-avail-2';
  return 'chip chip-avail-1';
}

/* ── Render ─────────────────────────────────────────────── */
function render(bym) {
  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';
  let totalS = 0, totalB = 0;

  MONTHS.forEach((name, mi) => {
    const cols   = getColsByDow(CONFIG.YEAR, mi);
    const bmap   = bym[mi];
    const allDays = cols.flat();
    const sold   = allDays.filter(d => bmap.has(d)).length;
    const avail  = allDays.length - sold;
    totalS += allDays.length;
    totalB += sold;

    const ratio   = allDays.length ? sold / allDays.length : 0;
    const barColor = avail === 0 ? 'var(--red)' : ratio >= .65 ? 'var(--amber)' : 'var(--green)';
    const [badgeCls, badgeTxt] =
      avail === 0       ? ['badge-full',  'Lotado']
      : ratio >= .65    ? ['badge-red',   `${avail}/${allDays.length}`]
      : avail <= allDays.length * .5 ? ['badge-amber', `${avail}/${allDays.length}`]
      :                   ['badge-green', `${avail}/${allDays.length}`];

    const card = document.createElement('div');
    card.className = 'month-card';

    // header
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `<span class="month-name">${name}</span>
      <span class="month-badge ${badgeCls}">${badgeTxt}</span>`;
    card.appendChild(hdr);

    // columns
    const colsEl = document.createElement('div');
    colsEl.className = 'day-cols';
    cols.forEach((days, dow) => {
      const availInCol = days.filter(d => !bmap.has(d)).length;
      const col = document.createElement('div');
      col.className = 'day-col';
      col.innerHTML = `<div class="col-header">${DOW_PT[dow]}</div>`;
      days.forEach(day => {
        const title = bmap.get(day);
        const isBooked = bmap.has(day);
        const chip = document.createElement('div');
        chip.className = chipClass(availInCol, isBooked);
        chip.textContent = day;
        if (isBooked && title) chip.setAttribute('data-tip', title);
        col.appendChild(chip);
      });
      colsEl.appendChild(col);
    });
    card.appendChild(colsEl);

    // mini bar
    const bar = document.createElement('div');
    bar.className = 'mini-bar';
    bar.innerHTML = `<div class="mini-fill" style="width:${Math.round(ratio*100)}%;background:${barColor}"></div>`;
    card.appendChild(bar);

    grid.appendChild(card);
  });

  // Header stats
  const pct = totalS ? Math.round(totalB / totalS * 100) : 0;
  document.getElementById('st-total').textContent = totalS;
  document.getElementById('st-sold').textContent  = totalB;
  document.getElementById('st-avail').textContent = totalS - totalB;
  document.getElementById('st-pct').textContent   = pct + '%';

  // Progress bar
  const pc = document.getElementById('pfill');
  pc.style.width    = pct + '%';
  pc.style.background = pct > 75 ? 'var(--red)' : pct > 50 ? 'var(--amber)' : 'var(--accent)';
  document.getElementById('plbl').textContent = `Ocupação atual: ${pct}%`;
}

/* ── Fetch from Google Calendar API ─────────────────────── */
async function load() {
  if (CONFIG.API_KEY === '__PLACEHOLDER__') {
    showError(
      'Configure sua chave de API',
      'Abra o arquivo <code>meyer-2026.html</code> em um editor de texto e substitua <code>SUA_CHAVE_API_AQUI</code> pela sua Google Calendar API Key.'
    );
    return;
  }

  setStatus('loading', 'Atualizando…');
  if (cdTimer) clearInterval(cdTimer);

  const tMin = `${CONFIG.YEAR}-01-01T00:00:00-03:00`;
  const tMax = `${CONFIG.YEAR}-12-31T23:59:59-03:00`;
  const url  = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CONFIG.CAL_ID)}/events`
             + `?key=${CONFIG.API_KEY}&timeMin=${tMin}&timeMax=${tMax}`
             + `&singleEvents=true&maxResults=250&fields=items(summary,start)`;

  try {
    const res  = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    render(buildBookedMap(data.items));
    setStatus('ok', 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}));
    startCountdown();
  } catch (e) {
    setStatus('error', 'Erro: ' + e.message);
    startCountdown(); // tenta novamente no próximo ciclo
  }
}

/* ── Status helpers ─────────────────────────────────────── */
function setStatus(state, msg) {
  const dot = document.getElementById('sdot');
  dot.className = 'status-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
  document.getElementById('stext').textContent = msg;
  document.getElementById('tv-updated').textContent = msg;
}

function startCountdown() {
  if (cdTimer) clearInterval(cdTimer);
  cdSec = CONFIG.INTERVAL * 60;
  const total = cdSec;
  const fill  = document.getElementById('cfill');
  const lbl   = document.getElementById('clbl');
  cdTimer = setInterval(() => {
    cdSec--;
    fill.style.width = Math.max(0, Math.round(cdSec / total * 100)) + '%';
    const m = Math.floor(cdSec / 60), s = cdSec % 60;
    lbl.textContent  = `${m}:${String(s).padStart(2, '0')}`;
    if (cdSec <= 0) { clearInterval(cdTimer); load(); }
  }, 1000);
}

/* ── TV mode ─────────────────────────────────────────────── */
function toggleTV() {
  isTV = !isTV;
  document.body.classList.toggle('tv', isTV);
}

/* ── Error overlay ───────────────────────────────────────── */
function showError(title, msg) {
  document.getElementById('ov-title').innerHTML = title;
  document.getElementById('ov-msg').innerHTML   = msg;
  document.getElementById('overlay').classList.add('show');
}

/* ── Init ────────────────────────────────────────────────── */
document.getElementById('year-label').textContent = CONFIG.YEAR;
load();
</script>
</body>
</html>
