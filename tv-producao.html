<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Produção · Primore</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--sf:#0d1117;--sf2:#161b22;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.16);
  --tx:#e6edf3;--mt:#6e7681;--mt2:#8b949e;
  --m-bg:#052e16;--m-bd:#16a34a;--m-tx:#86efac;
  --g-bg:#0c1a3a;--g-bd:#2563eb;--g-tx:#93c5fd;
  --v-bg:#1c1a00;--v-bd:#ca8a04;--v-tx:#fde047;
}
html,body{width:1920px;height:1080px;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif}

/* ── Chrome ── */
.prog{position:fixed;top:0;left:0;height:5px;background:linear-gradient(90deg,var(--m-bd),var(--g-bd),var(--v-bd));border-radius:0 99px 99px 0;transition:width linear;z-index:100}
.dots{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:100}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .3s}
.dot.on{background:rgba(255,255,255,.85)}

/* ── Slides ── */
.slides{position:relative;width:1920px;height:1080px}
.slide{position:absolute;inset:0;display:none;flex-direction:column;padding:18px 26px 26px;opacity:0;transition:opacity .5s}
.slide.on{display:flex;opacity:1}

/* ── Shared title ── */
.pg-title{font-size:28px;font-weight:700;letter-spacing:-.5px;padding-bottom:12px;border-bottom:1px solid var(--bd);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.pg-title .sub{font-size:13px;font-weight:400;color:var(--mt2);font-family:'DM Mono',monospace}
.year-big{font-size:56px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-2px;line-height:1}

/* ════ SLIDE 1 ═══════════════════════════════════ */

/* stat cards */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:12px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 12px;text-align:center}
.sc .n{font-size:46px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.sc .l{font-size:12px;font-weight:600}
.sc .s{font-size:10px;color:var(--mt);margin-top:2px}

/* venue summary */
.venue-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.vc{border-radius:10px;padding:12px 18px;border:1px solid;display:flex;align-items:center;gap:14px}
.vc .vn{font-size:16px;font-weight:700;flex:1}
.vc .vct{font-size:42px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.vc .vs{font-size:11px;margin-top:2px;opacity:.75}

/* DOW by venue */
.dow-section{margin-bottom:12px}
.dow-venue-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
.dow-venue-name{font-size:13px;font-weight:700;width:100px;flex-shrink:0}
.dow-days{display:flex;flex:1;gap:6px}
.dow-day-item{flex:1;display:flex;align-items:center;gap:6px}
.dow-day-label{font-size:11px;font-weight:600;color:var(--mt2);width:28px;flex-shrink:0;text-transform:uppercase}
.dow-bar-track{flex:1;height:18px;background:var(--sf2);border-radius:4px;overflow:hidden}
.dow-bar-fill{height:100%;border-radius:4px}
.dow-day-pct{font-size:11px;font-family:'DM Mono',monospace;color:var(--mt2);width:32px;text-align:right;flex-shrink:0}

/* Monthly summary */
.monthly-section{}
.monthly-title{font-size:11px;font-weight:600;color:var(--mt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.monthly-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.month-cell{background:var(--sf);border:1px solid var(--bd);border-radius:7px;padding:8px 6px;text-align:center}
.month-cell .mn{font-size:11px;font-weight:600;color:var(--mt2);margin-bottom:6px}
.month-cell .mt{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--tx);line-height:1;margin-bottom:4px}
.month-cell .mb{display:flex;flex-direction:column;gap:2px}
.month-pip{height:5px;border-radius:2px;min-width:2px}

/* ════ SLIDES 2 & 3 (calendar) ═══════════════════════════════════ */
.cal-header{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:10px;border-bottom:1px solid var(--bd);margin-bottom:10px}
.legend{display:flex;gap:18px;align-items:center;padding-bottom:4px}
.leg{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
.leg-dot{width:16px;height:10px;border-radius:2px}

.month-grid-4{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:7px;flex:1;min-height:0}
.month-card{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:8px 9px;display:flex;flex-direction:column;min-height:0}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0}
.mname{font-size:13px;font-weight:700;letter-spacing:.2px}
.mvc-row{display:flex;gap:4px}
.mvc{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px}
.mvc.m{background:var(--m-bg);color:var(--m-tx);border-left:2px solid var(--m-bd)}
.mvc.g{background:var(--g-bg);color:var(--g-tx);border-left:2px solid var(--g-bd)}
.mvc.v{background:var(--v-bg);color:var(--v-tx);border-left:2px solid var(--v-bd)}

.cal{flex:1;min-height:0;overflow:hidden}
.cal table{width:100%;border-collapse:separate;border-spacing:1px;table-layout:fixed}
.cal th{font-size:8px;font-weight:600;color:var(--mt);text-align:center;padding-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.cal td{vertical-align:top;padding:0}
.dc{padding:1px;border-radius:2px}
.dn{font-size:9px;font-weight:500;color:var(--mt);font-family:'DM Mono',monospace;line-height:1;padding:0 1px 1px}
.em .dn{visibility:hidden}
.et{display:block;width:100%;border-radius:2px;padding:1px 3px;font-size:7.5px;font-weight:500;line-height:1.4;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.et.m{background:var(--m-bg);color:var(--m-tx);border-left:2px solid var(--m-bd)}
.et.g{background:var(--g-bg);color:var(--g-tx);border-left:2px solid var(--g-bd)}
.et.v{background:var(--v-bg);color:var(--v-tx);border-left:2px solid var(--v-bd)}

/* ── status ── */
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mt)}
.sdot{width:7px;height:7px;border-radius:50%;background:#16a34a}
.sdot.ld{background:#b45309;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

// ── Helpers ──────────────────────────────────────────────────
function bmap(evs,venue){
  const out=new Map();
  (evs||[]).forEach(e=>{const d=(e.date||'').slice(0,10);if(!d)return;if(!out.has(d))out.set(d,[]);out.get(d).push({venue,t:e.t||e.title||e.summary||''});});
  return out;
}
function merge(...maps){const out=new Map();maps.forEach(m=>m.forEach((v,k)=>{if(!out.has(k))out.set(k,[]);out.get(k).push(...v);}));return out;}

function stats(data,year){
  const c={cas:0,'15anos':0,aniv:0,corp:0,out:0};
  const dow={m:[0,0,0,0,0,0,0],g:[0,0,0,0,0,0,0],v:[0,0,0,0,0,0,0]};
  const vc={m:0,g:0,v:0};
  const mon={m:Array(12).fill(0),g:Array(12).fill(0),v:Array(12).fill(0)};
  [['m',data.m],['g',data.g],['v',data.v]].forEach(([k,evs])=>{
    (evs||[]).forEach(e=>{
      const ct=cat(e.t);c[ct]=(c[ct]||0)+1;vc[k]++;
      const d=new Date(e.date+'T12:00:00');
      if(d.getFullYear()===year){dow[k][d.getDay()]++;mon[k][d.getMonth()]++;}
    });
  });
  return{c,dow,vc,mon,total:vc.m+vc.g+vc.v};
}

// ── Render calendar ──────────────────────────────────────────
function renderCal(containerId,year){
  const data=SEED[year];
  const dm=merge(bmap(data.m,'m'),bmap(data.g,'g'),bmap(data.v,'v'));
  const el=document.getElementById(containerId);el.innerHTML='';
  for(let mi=0;mi<12;mi++){
    const fd=new Date(year,mi,1).getDay();
    const dim=new Date(year,mi+1,0).getDate();
    const mc={m:0,g:0,v:0};
    for(let d=1;d<=dim;d++){const ds=`${year}-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;(dm.get(ds)||[]).forEach(e=>mc[e.venue]++);}
    const badges=['m','g','v'].filter(v=>mc[v]>0).map(v=>`<span class="mvc ${v}">${v==='m'?'M':v==='g'?'G':'V'}:${mc[v]}</span>`).join('');
    const card=document.createElement('div');card.className='month-card';
    card.innerHTML=`<div class="mhdr"><span class="mname">${MONTHS[mi]}</span><div class="mvc-row">${badges}</div></div>`;
    const cal=document.createElement('div');cal.className='cal';
    const tbl=document.createElement('table');
    tbl.innerHTML='<thead><tr>'+DOW_PT.map(d=>`<th>${d}</th>`).join('')+'</tr></thead>';
    const tbody=document.createElement('tbody');
    let day=1,col=fd,row=document.createElement('tr');
    for(let i=0;i<fd;i++){const td=document.createElement('td');td.innerHTML='<div class="dc em"><div class="dn">·</div></div>';row.appendChild(td);}
    while(day<=dim){
      if(col===7){tbody.appendChild(row);row=document.createElement('tr');col=0;}
      const ds=`${year}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const evs=dm.get(ds)||[];
      const td=document.createElement('td');
      const dc=document.createElement('div');dc.className='dc';
      const dn=document.createElement('div');dn.className='dn';dn.textContent=day;dc.appendChild(dn);
      evs.forEach(e=>{const et=document.createElement('span');et.className=`et ${e.venue}`;et.textContent=e.t;et.title=e.t;dc.appendChild(et);});
      td.appendChild(dc);row.appendChild(td);day++;col++;
    }
    while(col>0&&col<7){const td=document.createElement('td');td.innerHTML='<div class="dc em"><div class="dn">·</div></div>';row.appendChild(td);col++;}
    if(row.children.length)tbody.appendChild(row);
    tbl.appendChild(tbody);cal.appendChild(tbl);card.appendChild(cal);el.appendChild(card);
  }
}

// ── Slide rotator ────────────────────────────────────────────
const N=3;let cur=0,slideT=null,progT=null,sec=0;
function buildDots(){document.getElementById('dots').innerHTML=Array.from({length:N},(_,i)=>`<div class="dot${i===0?' on':''}" id="dt-${i}"></div>`).join('');}
function go(n){
  document.getElementById(`slide-${cur}`).classList.remove('on');
  document.getElementById(`dt-${cur}`).classList.remove('on');
  cur=n%N;
  document.getElementById(`slide-${cur}`).classList.add('on');
  document.getElementById(`dt-${cur}`).classList.add('on');
  startProg();
}
function startProg(){
  if(slideT)clearTimeout(slideT);if(progT)clearInterval(progT);
  sec=0;const pb=document.getElementById('prog'),nl=document.getElementById('next-lbl');
  pb.style.transition='none';pb.style.width='0%';
  setTimeout(()=>{pb.style.transition=`width ${SLIDE_SEC}s linear`;pb.style.width='100%';},50);
  progT=setInterval(()=>{sec++;const r=SLIDE_SEC-sec;if(nl)nl.textContent=`próximo em ${r}s`;if(sec>=SLIDE_SEC){clearInterval(progT);go(cur+1);}},1000);
}

// ── Live fetch ───────────────────────────────────────────────
async function fetchCal(id,year){
  const tMin=`${year}-01-01T00:00:00-03:00`,tMax=`${year}-12-31T23:59:59-03:00`;
  const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(id)}/events?key=${API_KEY}&timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&maxResults=250&fields=items(summary,start)`);
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  return(d.items||[]).map(e=>({date:(e.start?.date||e.start?.dateTime||'').slice(0,10),t:e.summary||''}));
}
async function fetchAll(){
  const sdot=document.getElementById('sdot'),stxt=document.getElementById('stxt');
  if(sdot)sdot.className='sdot ld';
  try{
    const[m6,g6,v6,m7,g7,v7]=await Promise.all([
      fetchCal(CAL_M,2026),fetchCal(CAL_G,2026),fetchCal(CAL_V,2026),
      fetchCal(CAL_M,2027),fetchCal(CAL_G,2027),fetchCal(CAL_V,2027),
    ]);
    SEED[2026]={m:m6,g:g6,v:v6};SEED[2027]={m:m7,g:g7,v:v7};
    renderAll();
    const hm=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(sdot)sdot.className='sdot';if(stxt)stxt.textContent='Atualizado às '+hm;
  }catch(e){if(sdot)sdot.className='sdot';if(stxt)stxt.textContent='Dados locais';}
  setTimeout(fetchAll,600000);
}

function renderAll(){renderResume();renderCal('cal-2026',2026);renderCal('cal-2027',2027);}
