<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Produção · Primore Eventos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--surface:#0d1117;--surface2:#161b22;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e6edf3;--muted:#6e7681;--muted2:#8b949e;
  --meyer-bg:#052e16;--meyer-border:#16a34a;--meyer-text:#86efac;
  --gia-bg:#0c1a3a;--gia-border:#2563eb;--gia-text:#93c5fd;
  --villa-bg:#1c1a00;--villa-border:#ca8a04;--villa-text:#fde047;
}
html{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:13px}
body{min-height:100vh;padding:14px;max-width:1700px;margin:0 auto}

/* ── Header ── */
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px}
.brand h1{font-size:15px;font-weight:600;letter-spacing:-.3px}
.brand p{font-size:11px;color:var(--muted);margin-top:1px}
.year-toggle{display:flex;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.yr-btn{padding:7px 20px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:transparent;color:var(--muted2);border:none;cursor:pointer;transition:all .15s}
.yr-btn.active{background:var(--border2);color:var(--text)}

/* ── Annual stats ── */
.annual-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.stat-card .num{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:3px}
.stat-card .lbl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px}
.stat-card .sub{font-size:9px;color:var(--muted);margin-top:2px}

/* ── Venue counts per year ── */
.venue-year-row{display:flex;gap:6px;margin-bottom:10px}
.venue-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:12px}
.venue-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.venue-name{font-size:12px;font-weight:600;flex:1}
.venue-count{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}
.venue-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* ── Day of week stats ── */
.dow-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px}
.dow-title{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.dow-bars{display:flex;gap:4px;align-items:flex-end;height:48px}
.dow-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.dow-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.dow-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s}
.dow-pct{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted2)}
.dow-day{font-size:9px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}

/* ── Status ── */
.status-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;background:#16a34a;flex-shrink:0}
.sdot.loading{background:#b45309;animation:blink .8s infinite}
.stext{font-size:11px;color:var(--muted2);flex:1}
.ctrack{width:60px;height:3px;background:var(--border2);border-radius:99px;overflow:hidden}
.cfill{height:100%;background:#16a34a;border-radius:99px;transition:width 1s linear}
.clbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;min-width:40px}
.btn-sm{padding:3px 9px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--muted2);border:1px solid var(--border2);border-radius:5px;cursor:pointer}

/* ── Month grid ── */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}

.month-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px}
.month-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:6px}
.month-name{font-size:12px;font-weight:600;letter-spacing:.3px}
.month-venue-counts{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.mvc{font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px}
.mvc.meyer{background:var(--meyer-bg);color:var(--meyer-text)}
.mvc.giardino{background:var(--gia-bg);color:var(--gia-text)}
.mvc.villa{background:var(--villa-bg);color:var(--villa-text)}

/* ── Calendar ── */
.cal table{width:100%;border-collapse:separate;border-spacing:1px}
.cal th{font-size:8px;font-weight:500;color:var(--muted);text-align:center;padding-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.cal td{vertical-align:top;padding:0;width:14.28%}
.day-cell{min-height:38px;padding:1px;border-radius:3px}
.day-num{font-size:9px;font-weight:500;color:var(--muted);font-family:'DM Mono',monospace;line-height:1;padding:1px 2px;margin-bottom:1px}
.empty .day-num{visibility:hidden}
.ev-tag{display:block;width:100%;border-radius:2px;padding:1px 3px;font-size:8px;font-weight:500;line-height:1.4;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.ev-tag.meyer{background:var(--meyer-bg);color:var(--meyer-text);border-left:2px solid var(--meyer-border)}
.ev-tag.giardino{background:var(--gia-bg);color:var(--gia-text);border-left:2px solid var(--gia-border)}
.ev-tag.villa{background:var(--villa-bg);color:var(--villa-text);border-left:2px solid var(--villa-border)}

/* ── Legend ── */
.legend{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.leg-items{display:flex;gap:16px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500}
.leg-dot{width:14px;height:9px;border-radius:2px}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

// ── State ────────────────────────────────────────────────────
let currentYear=2026, cdTimer=null, cdSec=0;

// ── Compute stats ────────────────────────────────────────────
function computeStats(data, year) {
  const cats={casamento:0,'15anos':0,aniversario:0,corporativo:0,outros:0};
  const dow=[0,0,0,0,0,0,0];
  const venue={meyer:0,giardino:0,villa:0};
  const all=[
    ...data.meyer.map(e=>({...e,v:'meyer'})),
    ...data.giardino.map(e=>({...e,v:'giardino'})),
    ...data.villa.map(e=>({...e,v:'villa'})),
  ];
  all.forEach(ev=>{
    const cat=categorize(ev.title);
    cats[cat]=(cats[cat]||0)+1;
    const d=new Date(ev.date+'T12:00:00');
    if(d.getFullYear()===year) dow[d.getDay()]++;
    venue[ev.v]++;
  });
  return {cats, dow, venue, total:all.length};
}

// ── Render stats ─────────────────────────────────────────────
function renderStats(data, year) {
  const {cats, dow, venue, total} = computeStats(data, year);

  // Annual stat cards
  const statsEl = document.getElementById('annual-stats');
  const cards = [
    {num:total,       lbl:'Total de Eventos', color:'#60a5fa', sub:'no ano'},
    {num:cats['15anos'],   lbl:'Debutantes (15 anos)', color:'#f472b6', sub:'bailes & festas'},
    {num:cats.casamento,  lbl:'Casamentos', color:'#a78bfa', sub:'& noivados'},
    {num:cats.aniversario,lbl:'Aniversários', color:'#fb923c', sub:'& comemorações'},
    {num:cats.corporativo,lbl:'Corporativos', color:'#34d399', sub:'& formaturas'},
    {num:cats.outros,     lbl:'Outros eventos', color:'var(--muted2)', sub:'diversos'},
  ];
  statsEl.innerHTML = cards.map(c=>`
    <div class="stat-card">
      <div class="num" style="color:${c.color}">${c.num}</div>
      <div class="lbl">${c.lbl}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');

  // Venue row
  const venueEl = document.getElementById('venue-row');
  const vData=[
    {key:'meyer',   name:'Meyer',          color:'var(--meyer-border)',  textColor:'var(--meyer-text)',  bg:'var(--meyer-bg)'},
    {key:'giardino',name:'Giardino',        color:'var(--gia-border)',    textColor:'var(--gia-text)',    bg:'var(--gia-bg)'},
    {key:'villa',   name:'Villa Domênica', color:'var(--villa-border)',  textColor:'var(--villa-text)',  bg:'var(--villa-bg)'},
  ];
  venueEl.innerHTML = vData.map(v=>{
    const pct = total ? Math.round(venue[v.key]/total*100) : 0;
    return `<div class="venue-card" style="background:${v.bg};border-color:${v.color}">
      <div class="venue-dot" style="background:${v.color}"></div>
      <div><div class="venue-name" style="color:${v.textColor}">${v.name}</div><div class="vendor-sub" style="font-size:10px;color:${v.textColor};opacity:.7">${pct}% dos eventos</div></div>
      <div class="vendor-count" style="font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:${v.textColor}">${venue[v.key]}</div>
    </div>`;
  }).join('');

  // Day of week bars
  const dowEl = document.getElementById('dow-bars');
  const maxDow = Math.max(...dow, 1);
  dowEl.innerHTML = dow.map((n, i) => {
    const pct = Math.round(n/total*100);
    const h = Math.round((n/maxDow)*100);
    const colors = ['#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b','#f97316','#ef4444'];
    return `<div class="dow-col">
      <div class="dow-bar-wrap"><div class="dow-bar" style="height:${h}%;background:${colors[i]};width:100%"></div></div>
      <div class="dow-pct">${pct}%</div>
      <div class="dow-day">${DOW_PT[i]}</div>
    </div>`;
  }).join('');
}

// ── Build day map ────────────────────────────────────────────
function buildDayMap(events, venue) {
  const m=new Map();
  (events||[]).forEach(ev=>{
    const d=(ev.date||'').slice(0,10);
    if(!d)return;
    if(!m.has(d))m.set(d,[]);
    m.get(d).push({venue,title:ev.title||ev.summary||''});
  });
  return m;
}
function mergeMaps(...maps){
  const out=new Map();
  maps.forEach(m=>m.forEach((v,k)=>{if(!out.has(k))out.set(k,[]);out.get(k).push(...v);}));
  return out;
}

// ── Render calendar ──────────────────────────────────────────
function renderCalendar(data, year) {
  const meyer   =buildDayMap(data.meyer,   'meyer');
  const giardino=buildDayMap(data.giardino,'giardino');
  const villa   =buildDayMap(data.villa,   'villa');
  const dayMap  =mergeMaps(meyer,giardino,villa);

  const grid=document.getElementById('month-grid');
  grid.innerHTML='';

  MONTHS.forEach((name,mi)=>{
    const firstDow=new Date(year,mi,1).getDay();
    const daysInMonth=new Date(year,mi+1,0).getDate();

    // per-venue count for this month
    const mCount={meyer:0,giardino:0,villa:0};
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      (dayMap.get(ds)||[]).forEach(ev=>mCount[ev.venue]++);
    }
    const mBadges=['meyer','giardino','villa']
      .filter(v=>mCount[v]>0)
      .map(v=>`<span class="mvc ${v}">${v==='meyer'?'M':v==='giardino'?'G':'V'}: ${mCount[v]}</span>`)
      .join('');

    const card=document.createElement('div');
    card.className='month-card';
    card.innerHTML=`<div class="month-header"><span class="month-name">${name}</span><div class="month-venue-counts">${mBadges}</div></div>`;

    const cal=document.createElement('div');
    cal.className='cal';
    const table=document.createElement('table');
    const thead=document.createElement('thead');
    thead.innerHTML='<tr>'+DOW_PT.map(d=>`<th>${d}</th>`).join('')+'</tr>';
    table.appendChild(thead);

    const tbody=document.createElement('tbody');
    let day=1,col=firstDow;
    let row=document.createElement('tr');

    for(let i=0;i<firstDow;i++){
      const td=document.createElement('td');
      td.innerHTML='<div class="day-cell empty"><div class="day-num">·</div></div>';
      row.appendChild(td);
    }

    while(day<=daysInMonth){
      if(col===7){tbody.appendChild(row);row=document.createElement('tr');col=0;}
      const ds=`${year}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const evs=dayMap.get(ds)||[];
      const td=document.createElement('td');
      const cell=document.createElement('div');
      cell.className='day-cell';
      const numEl=document.createElement('div');
      numEl.className='day-num';
      numEl.textContent=day;
      cell.appendChild(numEl);
      evs.forEach(ev=>{
        const tag=document.createElement('span');
        tag.className=`ev-tag ${ev.venue}`;
        tag.textContent=ev.title;
        tag.title=ev.title;
        cell.appendChild(tag);
      });
      td.appendChild(cell);
      row.appendChild(td);
      day++;col++;
    }
    while(col>0&&col<7){
      const td=document.createElement('td');
      td.innerHTML='<div class="day-cell empty"><div class="day-num">·</div></div>';
      row.appendChild(td);col++;
    }
    if(row.children.length)tbody.appendChild(row);
    table.appendChild(tbody);
    cal.appendChild(table);
    card.appendChild(cal);
    grid.appendChild(card);
  });
}

// ── Full render ──────────────────────────────────────────────
function render(data, year) {
  renderStats(data, year);
  renderCalendar(data, year);
}

// ── Year toggle ──────────────────────────────────────────────
function setYear(y){
  currentYear=y;
  document.getElementById('btn2026').classList.toggle('active',y===2026);
  document.getElementById('btn2027').classList.toggle('active',y===2027);
  render(SEED[y],y);
}

// ── Live fetch ───────────────────────────────────────────────
function setStatus(state,msg){
  document.getElementById('sdot').className='sdot'+(state==='loading'?' loading':'');
  document.getElementById('stext').textContent=msg;
}
function startCountdown(){
  if(cdTimer)clearInterval(cdTimer);
  cdSec=600;const total=600;
  const fill=document.getElementById('cfill'),lbl=document.getElementById('clbl');
  cdTimer=setInterval(()=>{
    cdSec--;
    fill.style.width=Math.max(0,Math.round(cdSec/total*100))+'%';
    const m=Math.floor(cdSec/60),s=cdSec%60;
    lbl.textContent=m+':'+String(s).padStart(2,'0');
    if(cdSec<=0){clearInterval(cdTimer);load();}
  },1000);
}
async function fetchCal(calId,year){
  const tMin=`${year}-01-01T00:00:00-03:00`,tMax=`${year}-12-31T23:59:59-03:00`;
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${API_KEY}&timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&maxResults=250&fields=items(summary,start)`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  return(data.items||[]).map(ev=>({date:(ev.start?.date||ev.start?.dateTime||'').slice(0,10),title:ev.summary||''}));
}
async function load(){
  setStatus('loading','Atualizando…');
  if(cdTimer)clearInterval(cdTimer);
  try{
    const[m26,g26,v26,m27,g27,v27]=await Promise.all([
      fetchCal(CAL_MEYER,2026),fetchCal(CAL_GIARDINO,2026),fetchCal(CAL_VILLA,2026),
      fetchCal(CAL_MEYER,2027),fetchCal(CAL_GIARDINO,2027),fetchCal(CAL_VILLA,2027),
    ]);
    SEED[2026]={meyer:m26,giardino:g26,villa:v26};
    SEED[2027]={meyer:m27,giardino:g27,villa:v27};
    render(SEED[currentYear],currentYear);
    const hm=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setStatus('ok','Atualizado às '+hm);
    document.getElementById('updated-lbl').textContent='Atualizado: '+hm;
  }catch(e){
    render(SEED[currentYear],currentYear);
    setStatus('error','Dados locais — '+e.message);
  }
  startCountdown();
}

render(SEED[2026],2026);
load();
